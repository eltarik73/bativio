spring:
  application:
    name: bativio-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:bativio}}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER:bativio}
    password: ${PGPASSWORD:bativio}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  h2:
    console:
      enabled: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:bativio-dev-secret-key-minimum-256-bits-pour-hmac-sha256}
  access-expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    com.bativio: INFO
    org.springframework.security: INFO

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
