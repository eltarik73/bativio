<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Concept 2: Geometric B with building blocks -->
  <g transform="translate(2, 6)">
    <!-- Block bottom-left -->
    <rect x="0" y="24" width="18" height="18" rx="3" fill="#C4531A"/>
    <!-- Block bottom-right -->
    <rect x="22" y="24" width="18" height="18" rx="3" fill="#C4531A" opacity="0.6"/>
    <!-- Block top-left -->
    <rect x="0" y="2" width="18" height="18" rx="3" fill="#C4531A" opacity="0.35"/>
    <!-- Block top-right (accent) -->
    <rect x="22" y="2" width="18" height="18" rx="3" fill="#E8A84C"/>
  </g>

  <!-- Text -->
  <text x="56" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1C1C1E" letter-spacing="-0.5">Bativio</text>
</svg>
