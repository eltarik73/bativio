<!DOCTYPE html>
<html><head><style>
body { font-family: system-ui; background: #FAF8F5; padding: 40px; max-width: 900px; margin: 0 auto; }
.row { display: flex; gap: 32px; flex-wrap: wrap; margin-bottom: 40px; }
.card { background: #fff; border-radius: 16px; padding: 40px 48px; border: 1px solid #E8D5C0; text-align: center; flex: 1; min-width: 250px; }
.card img { height: 52px; }
.label { margin-top: 14px; font-size: 13px; color: #3D2E1F; font-weight: 700; }
.sub { font-size: 11px; color: #9C958D; margin-top: 4px; line-height: 1.4; }
h1 { font-size: 20px; color: #3D2E1F; margin-bottom: 24px; }
.dark { background: #1C1C1E; border-color: #333; }
.dark .label { color: #fff; }
.dark .sub { color: #666; }
</style></head>
<body>
<h1>Mix final — Les 3 concepts</h1>
<div class="row">
  <div class="card">
    <img src="logo-final-a.svg" />
    <div class="label">A — Pyramide + toit</div>
    <div class="sub">Blocs pyramide (8) + toit stylise (1)<br/>Construction progressive + artisan</div>
  </div>
  <div class="card">
    <img src="logo-final-b.svg" />
    <div class="label">B — Grille croissance</div>
    <div class="sub">Blocs en escalier (2+5)<br/>Tech/SaaS + croissance visible</div>
  </div>
  <div class="card">
    <img src="logo-final-c.svg" />
    <div class="label">C — Maison en blocs</div>
    <div class="sub">Maison (1) construite en blocs (2)<br/>Artisan + modernite</div>
  </div>
</div>

<h1>Sur fond sombre</h1>
<div class="row">
  <div class="card dark">
    <img src="logo-final-a.svg" />
    <div class="label">A</div>
  </div>
  <div class="card dark">
    <img src="logo-final-b.svg" />
    <div class="label">B</div>
  </div>
  <div class="card dark">
    <img src="logo-final-c.svg" />
    <div class="label">C</div>
  </div>
</div>
</body></html>
