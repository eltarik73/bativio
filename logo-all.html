<!DOCTYPE html>
<html><head><style>
body { font-family: system-ui; background: #FAF8F5; padding: 40px; }
.row { display: flex; gap: 60px; flex-wrap: wrap; }
.card { background: #fff; border-radius: 16px; padding: 40px 48px; border: 1px solid #E8D5C0; text-align: center; }
.card img { height: 60px; }
.label { margin-top: 16px; font-size: 13px; color: #9C958D; font-weight: 600; }
h1 { font-size: 22px; color: #3D2E1F; margin-bottom: 32px; }
.dark { background: #1C1C1E; border-color: #333; }
</style></head>
<body>
<h1>Logos Bativio — 4 concepts</h1>
<div class="row">
  <div class="card">
    <img src="logo-concept.svg" />
    <div class="label">1 — Maison artisan</div>
  </div>
  <div class="card">
    <img src="logo-concept2.svg" />
    <div class="label">2 — Blocs bâtiment</div>
  </div>
  <div class="card">
    <img src="logo-concept3.svg" />
    <div class="label">3 — Bouclier confiance</div>
  </div>
  <div class="card">
    <img src="logo-concept4.svg" />
    <div class="label">4 — Toit + connexion</div>
  </div>
</div>
<br/>
<h1>Sur fond sombre</h1>
<div class="row">
  <div class="card dark">
    <img src="logo-concept.svg" />
  </div>
  <div class="card dark">
    <img src="logo-concept2.svg" />
  </div>
  <div class="card dark">
    <img src="logo-concept3.svg" />
  </div>
  <div class="card dark">
    <img src="logo-concept4.svg" />
  </div>
</div>
</body></html>
