<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <!-- Mix C: Maison moderne (1) + blocs (2) + croissance (5) -->
  <g transform="translate(2, 4)">
    <!-- Maison stylisée avec blocs -->
    <!-- Toit -->
    <path d="M21 4L38 18" stroke="#C4531A" stroke-width="3" stroke-linecap="round"/>
    <path d="M21 4L4 18" stroke="#E8A84C" stroke-width="3" stroke-linecap="round"/>
    <!-- 4 blocs formant les murs -->
    <rect x="4" y="20" width="15" height="13" rx="3" fill="#C4531A"/>
    <rect x="23" y="20" width="15" height="13" rx="3" fill="#C4531A" opacity="0.65"/>
    <rect x="4" y="36" width="15" height="13" rx="3" fill="#C4531A" opacity="0.4"/>
    <rect x="23" y="36" width="15" height="13" rx="3" fill="#E8A84C" opacity="0.7"/>
  </g>

  <!-- Text -->
  <text x="54" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" letter-spacing="-0.3">
    <tspan fill="#C4531A">B</tspan><tspan fill="#1C1C1E">ativio</tspan>
  </text>
  <text x="54" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="#9C958D">PLATEFORME ARTISANS</text>
</svg>
